name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      BOT_TOKEN: 123456:test_bot_token
      GEMINI_API_KEY: test_gemini_api_key
      ADMIN_IDS: "123456789"
      DB_PATH: .test_runtime/ci.sqlite
      RATE_LIMIT_BACKEND: memory
      READING_SESSION_BACKEND: memory
      READING_AUDIO_QUEUE_BACKEND: memory
      METRICS_REDIS_STREAM_ENABLED: "0"
      AUDIO_CACHE_DIR: .test_runtime/audio_cache
      TEST_REDIS_URL: redis://localhost:6379/15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Prepare runtime directory
        run: mkdir -p .test_runtime

      - name: Run tests
        run: python -m pytest

      - name: Run Redis integration tests
        run: python -m pytest integration_tests -q
