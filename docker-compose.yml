# Файл: docker-compose.yml

services:
  redis:
    image: redis:7-alpine
    container_name: utos_audio_redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "64mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    mem_limit: 128m
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build:
      context: .
    container_name: utos_audio_bot
    restart: unless-stopped
    mem_limit: 1g
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DB_PATH: /app/data/bot_database.sqlite
      AUDIO_CACHE_DIR: /app/data/audio_cache
      AUDIO_CACHE_ENABLED: "1"
      RATE_LIMIT_BACKEND: redis
      READING_SESSION_BACKEND: redis
      READING_AUDIO_QUEUE_BACKEND: redis
      READING_AUDIO_QUEUE_MAX_SIZE: "20"
      API_ENABLED: "1"
      API_HOST: 0.0.0.0
      API_PORT: "8080"
      LOG_FORMAT: text
      METRICS_REDIS_STREAM_ENABLED: "1"
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_HOST_PORT:-8081}:8080"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()",
        ]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
